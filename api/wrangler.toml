name = "crisis-guardian-api"
main = "dist/worker.js"
compatibility_date = "2025-08-19"

routes = [
  { pattern = "api.brightpathtechnology.io/*", zone_name = "brightpathtechnology.io" }
]

[[d1_databases]]
binding = "DB"
database_name = "crisis_guardian"
database_id = "REPLACE_ON_CREATE"

[vars]
ALLOWED_ORIGIN = "https://brightpathtechnology.io"
ADMIN_API_KEY = "to-be-set-in-dashboard"